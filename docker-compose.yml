services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-stock-report-api:local
    container_name: ai-stock-report-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      API_HOST: "0.0.0.0"
      REPORTS_DIR: "/app/reports"
    volumes:
      - reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Streamlit UI ────────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    image: ai-stock-report-streamlit:local
    container_name: ai-stock-report-streamlit
    ports:
      - "8501:8501"
    environment:
      # Reach API via Docker internal network — never use localhost here
      API_BASE: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Named volume — swap for an EFS mount in production
  reports:
    driver: local
